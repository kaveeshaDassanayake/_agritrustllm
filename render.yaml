services:
  - type: web
    name: agritrust-llm
    runtime: python
    buildCommand: pip install -r requirements.txt && python preload_models.py
    startCommand: gunicorn app:app --chdir backend --bind 0.0.0.0:10000 --timeout 120 --workers 1
    envVars:
      - key: HF_API_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: TRANSFORMERS_OFFLINE
        value: "1"
      - key: HF_DATASETS_OFFLINE
        value: "1"
