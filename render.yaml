services:
  - type: web
    name: agritrust-llm
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --chdir backend --bind 0.0.0.0:10000 --timeout 300 --workers 1
    envVars:
      - key: HF_API_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.9
